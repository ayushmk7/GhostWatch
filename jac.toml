[project]
name = "ghostwatch"
version = "1.0.0"
description = "GhostWatch autonomous code defense"
entry-point = "main.jac"

[dependencies]
PyGithub = "^2.0.0"
requests = "^2.31.0"
python-dotenv = "^1.0.0"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"
"@xyflow/react" = "latest"
jac-client-node = "1.0.7"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
"@jac-client/dev-deps" = "2.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[plugins.byllm.model]
default_model = "claude-sonnet-4-20250514"

[plugins.client]
port = 3000

[serve]
port = 8000
base_route_app = "app"
